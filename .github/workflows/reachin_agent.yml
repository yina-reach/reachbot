name: ReachIn Connect Agent

# Polls the ReachIn Connect inbox: classifies submitted PDFs/URLs, emails Tony a
# proposal, and files approved items into Notion.
#
# Starts as manual-trigger only. Once the 5 secrets below are set in the repo
# (Settings -> Secrets and variables -> Actions) and a live run looks good,
# uncomment the `schedule` block to poll automatically.

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '*/15 * * * *'   # every 15 minutes

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install --quiet google-genai pypdf trafilatura
      - name: Poll inbox
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_WRITE_TOKEN: ${{ secrets.NOTION_WRITE_TOKEN }}
          REACHIN_EMAIL: ${{ secrets.REACHIN_EMAIL }}
          REACHIN_EMAIL_APP_PASSWORD: ${{ secrets.REACHIN_EMAIL_APP_PASSWORD }}
          TONY_EMAIL: ${{ secrets.TONY_EMAIL }}
        run: python email_agent.py --poll
