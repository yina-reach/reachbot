name: ReachIn Connect Agent

# Polls the ReachIn Connect inbox: classifies submitted PDFs/URLs, emails Tony a
# proposal, and files approved items into Notion.
#
# Starts as manual-trigger only. Once the 5 secrets below are set in the repo
# (Settings -> Secrets and variables -> Actions) and a live run looks good,
# uncomment the `schedule` block to poll automatically.

on:
  workflow_dispatch:          # manual + external triggers (e.g. cron-job.org)
  schedule:
    # GitHub's scheduled runs are best-effort and often delayed on private repos.
    # */30 gives more firing attempts; for guaranteed timing, drive workflow_dispatch
    # from an external scheduler (see MAINTENANCE.md).
    - cron: '7,37 * * * *'    # every 30 min at :07/:37 — off the top-of-hour rush

# Don't pile up runs if one is slow/queued.
concurrency:
  group: reachin-agent
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements-agent.txt
      - name: Install deps
        run: pip install --quiet -r requirements-agent.txt
      - name: Poll inbox
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_WRITE_TOKEN: ${{ secrets.NOTION_WRITE_TOKEN }}
          REACHIN_EMAIL: ${{ secrets.REACHIN_EMAIL }}
          REACHIN_EMAIL_APP_PASSWORD: ${{ secrets.REACHIN_EMAIL_APP_PASSWORD }}
          TONY_EMAIL: ${{ secrets.TONY_EMAIL }}
        run: python email_agent.py --poll
