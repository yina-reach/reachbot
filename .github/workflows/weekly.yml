name: Weekly ReachIn refresh
# Re-exports Notion + re-embeds every Monday 6am UTC, commits the new index.
# Streamlit Community Cloud auto-redeploys when the repo updates.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch: {}   # also lets you trigger it manually from the Actions tab

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Export Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python reachin_export.py

      - name: Pull new Zoom transcripts (past week only)
        env:
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
        run: python zoom_transcripts.py --since-days 8

      - name: Rebuild index
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python ingest.py

      - name: Commit refreshed index
        run: |
          git config user.name "reachbot-bot"
          git config user.email "actions@github.com"
          git add reachin_md transcripts index.npz
          git commit -m "Weekly refresh: $(date -u +%Y-%m-%d)" || echo "No changes"
          git push
