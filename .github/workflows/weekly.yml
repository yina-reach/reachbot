name: Weekly ReachBot Refresh

on:
  schedule:
    # Every Monday at 6 AM UTC (2 AM ET)
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      force_ingest:
        description: "Force re-embed all chunks (slow)"
        required: false
        default: "false"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── Step 1: Export Notion content ──────────────────────────────────────
      - name: Export Notion → markdown
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: python reachin_export.py

      # ── Step 1b: Fetch external links from Notion pages ──────────────────
      - name: Fetch external article links
        # Nice-to-have enrichment — never let a scrape failure block the index rebuild.
        continue-on-error: true
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        # trafilatura is a scraper-only dep, kept out of requirements.txt (which is
        # just the ingest pipeline); install it inline only for this step.
        run: |
          pip install trafilatura
          python fetch_external_links.py

      # ── Step 2: Pull new Zoom transcripts (if API creds are configured) ───
      - name: Pull Zoom transcripts
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ZOOM_ACCOUNT_ID: ${{ secrets.ZOOM_ACCOUNT_ID }}
          ZOOM_CLIENT_ID: ${{ secrets.ZOOM_CLIENT_ID }}
          ZOOM_CLIENT_SECRET: ${{ secrets.ZOOM_CLIENT_SECRET }}
        # Only run if Zoom creds are set; otherwise skip gracefully
        run: |
          if [ -n "$ZOOM_ACCOUNT_ID" ] && [ -n "$ZOOM_CLIENT_ID" ] && [ -n "$ZOOM_CLIENT_SECRET" ]; then
            python zoom_transcripts.py --zoom-api --since-days 8
          else
            echo "Zoom API credentials not configured — skipping transcript pull."
            echo "Set ZOOM_ACCOUNT_ID, ZOOM_CLIENT_ID, ZOOM_CLIENT_SECRET in GitHub Secrets."
          fi

      # ── Step 3: Rebuild vector index ──────────────────────────────────────
      - name: Rebuild index
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.force_ingest }}" = "true" ]; then
            python ingest.py --force
          else
            python ingest.py
          fi

      # ── Step 4: Commit updated index ──────────────────────────────────────
      # `index_changed` is exported so the redeploy step only runs when the index
      # actually changed (avoids a needless Fly deploy on no-op weeks).
      - name: Commit index.npz
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.npz transcripts/ reachin_md/
          if git diff --cached --quiet; then
            echo "Nothing changed — index is up to date."
            echo "index_changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: weekly index refresh $(date -u +%Y-%m-%d)"
            # Integrate any commits pushed to main while this ~30-min job ran,
            # then push. Retry to survive a race with a concurrent push.
            for i in 1 2 3; do
              git pull --rebase origin main && git push \
                && { echo "index_changed=true" >> "$GITHUB_OUTPUT"; exit 0; }
              echo "push race — retrying ($i)"; sleep 5
            done
            echo "push failed after retries"; exit 1
          fi

      # ── Step 5: Redeploy the backend so it reloads the new index ──────────
      # The index is baked into the Fly image, so a fresh deploy is what picks up
      # the rebuilt index.npz. Skipped when nothing changed, or if FLY_API_TOKEN
      # isn't configured yet (so the job still succeeds pre-Fly-setup).
      - name: Redeploy backend (Fly.io)
        if: steps.commit.outputs.index_changed == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not set — skipping backend redeploy."
            echo "Add it in GitHub Secrets once the Fly app exists (fly tokens create deploy)."
            exit 0
          fi
          curl -L https://fly.io/install.sh | sh
          export FLYCTL_INSTALL="$HOME/.fly"
          export PATH="$FLYCTL_INSTALL/bin:$PATH"
          # Build context is the repo root so index.npz is included (see fly.toml).
          flyctl deploy --remote-only --config fly.toml
